<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemceekakes – Bakery in Lugbe, Abuja</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--cream:#f5ede3;
--brown-dark:#4a1e0f;
--brown-bg:#5c2d1a;
--gold:#c8922a;
--pink:#c95f72;
--pink-dark:#b84d61;
--white:#fff;
}

body{
font-family:'Lato',sans-serif;
background:var(--cream);
max-width:480px;
margin:auto;
color:var(--brown-dark);
}

/* NAV */
nav{
position:sticky;
top:0;
background:var(--cream);
display:flex;
justify-content:space-between;
padding:15px 20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-family:'Playfair Display',serif;
font-weight:800;
}

/* HERO */
.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.5)),
url('hero.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:30px 20px;
color:white;
}

.hero h1{
font-size:2.5rem;
margin-bottom:10px;
}

.hero p{
margin-bottom:20px;
}

/* BUTTONS */
.btn{
display:block;
text-align:center;
padding:14px;
border-radius:12px;
margin-bottom:10px;
text-decoration:none;
font-weight:700;
}

.btn-primary{background:var(--pink);color:white;}
.btn-outline{border:2px solid white;color:white;}

/* SECTIONS */
section{padding:50px 20px;}

/* CAKES */
.cake-card img{
width:100%;
height:300px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
}

/* CONTACT */
.contact{
background:var(--brown-bg);
color:white;
}

.map{
height:250px;
border-radius:15px;
overflow:hidden;
margin-top:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:var(--brown-bg);
color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">🎂 Kemceekakes</div>
<a href="https://wa.me/2348066578248" class="btn-primary btn">Order</a>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Cakes baked with love</h1>
<p>For your sweetest moments</p>

<a href="https://wa.me/2348066578248" class="btn btn-primary">Order on WhatsApp</a>
<a href="#cakes" class="btn btn-outline">View Cakes</a>
</section>

<!-- CAKES -->
<section id="cakes">
<h2>Our Cakes</h2>

<div class="cake-card">
<img src="cake1.jpg">
</div>

<div class="cake-card">
<img src="cake2.jpg">
</div>

<div class="cake-card">
<img src="cake3.jpg">
</div>

</section>

<!-- CONTACT -->
<section class="contact">

<h2>Contact Us</h2>

<p>📍 No 5 Eternity Avenue, Lugbe, Abuja</p>
<p>📞 0806 657 8248</p>

<a href="tel:08066578248" class="btn btn-primary">Call Now</a>
<a href="https://wa.me/2348066578248" class="btn btn-primary">WhatsApp</a>
<a href="https://www.instagram.com/kemceekakes" class="btn btn-primary">Instagram</a>

<div class="map">
<iframe
src="https://maps.google.com/maps?q=No+5+Eternity+Avenue+Lugbe+Abuja&output=embed"
width="100%" height="100%" style="border:0;">
</iframe>
</div>

</section>

<footer>
© 2026 Kemceekakes
</footer>

</body>
</html>
