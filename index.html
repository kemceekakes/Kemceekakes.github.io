<style>
/* (UNCHANGED STYLES — SAME AS YOUR ORIGINAL) */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--cream:#f5ede3;--brown-dark:#4a1e0f;--brown-bg:#5c2d1a;
--gold:#c8922a;--gold-light:#d4a843;
--pink:#c95f72;--pink-dark:#b84d61;
--white:#fff;--card-bg:#fff;--text-muted:#8a7060;
}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--brown-dark);max-width:480px;margin:auto;}
nav{position:sticky;top:0;display:flex;justify-content:space-between;padding:14px 20px;background:var(--cream);}
.logo{display:flex;gap:10px;}
.logo-icon{width:44px;height:44px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.logo-text{font-family:'Playfair Display',serif;font-weight:700;}
.btn-order-nav{background:var(--pink);color:#fff;padding:12px 22px;border-radius:50px;text-decoration:none;}
.hero{min-height:100vh;background:linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.6)),url("cake1.jpg") center/cover;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;padding:30px;}
.hero h1{font-family:'Playfair Display',serif;font-size:2.5rem;margin-bottom:10px;}
.section{padding:30px 20px;}
.cake-card img{width:100%;height:320px;object-fit:cover;border-radius:20px;}
.section-contact{background:var(--brown-bg);color:#fff;padding:30px 20px;}
.btn-call{background:var(--pink);color:#fff;padding:16px;border-radius:12px;text-decoration:none;display:block;text-align:center;margin-bottom:10px;}
.map-wrap{margin-top:20px;height:250px;border-radius:15px;overflow:hidden;}
footer{background:var(--brown-bg);color:#fff;text-align:center;padding:20px;}
</style>
</head>
