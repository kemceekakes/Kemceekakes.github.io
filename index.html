<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemceekakes – Bakery in Lugbe, Abuja</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5ede3;
    --brown-dark: #4a1e0f;
    --brown-mid: #6b3a24;
    --brown-bg: #5c2d1a;
    --gold: #c8922a;
    --gold-light: #d4a843;
    --pink: #c95f72;
    --pink-dark: #b84d61;
    --white: #ffffff;
    --card-bg: #ffffff;
    --text-muted: #8a7060;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--brown-dark);
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    box-shadow: 0 2px 8px rgba(74,30,15,0.08);
  }

  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--brown-dark);
  }

  .btn-order-nav {
    background: var(--pink);
    color: white;
    border-radius: 50px;
    padding: 12px 22px;
    font-weight: 700;
    text-decoration: none;
  }

  /* HERO — ONLY IMAGE CHANGED */
  .hero {
    min-height: 100svh;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.45)),
      url('hero.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 40px 24px 50px;
    color: white;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    margin-bottom: 16px;
  }

  .hero-sub { margin-bottom: 32px; }

  .btn-primary {
    background: var(--pink);
    color: white;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    text-decoration: none;
    display: block;
    margin-bottom: 12px;
  }

  .btn-secondary {
    border: 2px solid white;
    color: white;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    text-decoration: none;
  }

  section { padding: 60px 24px; }

  .section-contact {
    background: var(--brown-bg);
    color: white;
  }

  .map-wrap {
    border-radius: 20px;
    overflow: hidden;
    margin-top: 20px;
    height: 260px;
  }

  footer {
    background: var(--brown-bg);
    padding: 28px;
    text-align: center;
    color: rgba(255,255,255,0.6);
  }
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a class="logo" href="#">
    <div class="logo-icon">🎂</div>
    <span class="logo-text">Kemceekakes</span>
  </a>
  <a class="btn-order-nav" href="tel:08066578248">📞 Order Now</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Cakes baked with love</h1>
  <p class="hero-sub">For your sweetest moments</p>

  <!-- ✅ ADDED WHATSAPP BUTTON (same style) -->
  <a class="btn-primary" href="https://wa.me/2348066578248">Order on WhatsApp</a>
  <a class="btn-secondary" href="#contact">Contact Us</a>
</section>

<!-- CONTACT PANEL (UNCHANGED STYLE + ADDED INSTAGRAM) -->
<section class="section-contact" id="contact">

<h2>Contact Us</h2>

<p>📍 No 5 Eternity Avenue, Redeemer Estate Pyakasa, Lugbe, Abuja</p>
<p>📞 0806 657 8248</p>

<a class="btn-primary" href="tel:08066578248">Call Now</a>
<a class="btn-primary" href="https://wa.me/2348066578248">WhatsApp</a>

<!-- ✅ ADDED INSTAGRAM -->
<a class="btn-primary" href="https://www.instagram.com/kemceekakes">Instagram</a>

<!-- MAP (KEPT) -->
<div class="map-wrap">
<iframe
src="https://maps.google.com/maps?q=No+5+Eternity+Avenue+Redeemer+Estate+Pyakasa+Lugbe+Abuja&output=embed"
width="100%" height="100%" style="border:0;">
</iframe>
</div>

</section>

<footer>
© 2026 Kemceekakes
</footer>

</body>
</html>
