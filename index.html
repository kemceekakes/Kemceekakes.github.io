<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemceekakes – Bakery in Lugbe, Abuja</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5ede3;
    --brown-dark: #4a1e0f;
    --brown-mid: #6b3a24;
    --brown-bg: #5c2d1a;
    --gold: #c8922a;
    --gold-light: #d4a843;
    --pink: #c95f72;
    --pink-dark: #b84d61;
    --white: #ffffff;
    --card-bg: #ffffff;
    --text-muted: #8a7060;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--brown-dark);
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    box-shadow: 0 2px 8px rgba(74,30,15,0.08);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--brown-dark);
  }

  .btn-order-nav {
    background: var(--pink);
    color: white;
    border-radius: 50px;
    padding: 12px 22px;
    text-decoration: none;
    font-weight: 700;
  }

  /* ✅ HERO IMAGE REPLACED */
  .hero {
    position: relative;
    min-height: 100svh;
    background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.45)),
      url('https://instagram.fabv2-1.fna.fbcdn.net/v/t51.2885-15/358695026_1275102086715899_2363082775638200582_n.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 40px 24px 50px;
    color: white;
  }

  .hero-badge {
    background: var(--gold);
    padding: 8px 18px;
    border-radius: 50px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    margin-bottom: 16px;
  }

  .hero-sub { margin-bottom: 32px; }

  .btn-primary, .btn-secondary {
    display:block;
    text-align:center;
    padding:16px;
    border-radius:14px;
    margin-bottom:10px;
    text-decoration:none;
  }

  .btn-primary { background:var(--pink); color:white; }
  .btn-secondary { border:2px solid white; color:white; }

  .section-creations { padding: 60px 24px; }

  .cake-card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 15px;
  }

  .section-contact {
    background: var(--brown-bg);
    padding: 40px 24px;
    color: white;
  }

  .btn-call {
    background: var(--pink);
    color: white;
    border-radius: 14px;
    padding: 16px;
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 12px;
  }

  .map-wrap {
    margin-top: 20px;
    height: 250px;
    border-radius: 15px;
    overflow: hidden;
  }

  footer {
    background: var(--brown-bg);
    text-align: center;
    padding: 20px;
    color: white;
  }
</style>
</head>

<body>

<nav>
  <div class="logo">
    <div class="logo-icon">🎂</div>
    <span class="logo-text">Kemceekakes</span>
  </div>
  <a class="btn-order-nav" href="tel:08066578248">📞 Order Now</a>
</nav>

<section class="hero">
  <div class="hero-badge">Bakery in Lugbe, Abuja</div>
  <h1>Cakes baked with love</h1>
  <p class="hero-sub">Luxury cakes for every celebration.</p>
  <a class="btn-primary" href="tel:08066578248">📞 Place Order</a>
  <a class="btn-secondary" href="#creations">Explore Cakes</a>
</section>

<section class="section-creations" id="creations">
  <div class="cake-card"><img src="cake1.jpg"></div>
  <div class="cake-card"><img src="cake2.jpg"></div>
  <div class="cake-card"><img src="cake3.jpg"></div>
</section>

<section class="section-contact">

<p>📍 No 5 Eternity Avenue, Lugbe, Abuja</p>
<p>📞 0806 657 8248</p>

<a class="btn-call" href="tel:08066578248">📞 Call Now</a>
<a class="btn-call" href="https://wa.me/2348066578248">💬 Chat on WhatsApp</a>
<a class="btn-call" href="https://www.instagram.com/kemceekakes?igsh=bmViNXJoejRvaWdm">📸 Instagram</a>

<div class="map-wrap">
<iframe src="https://maps.google.com/maps?q=No+5+Eternity+Avenue+Redeemer+Estate+Pyakasa+Lugbe+Abuja&output=embed" width="100%" height="100%" style="border:0;"></iframe>
</div>

</section>

<footer>
© 2026 Kemceekakes
</footer>

</body>
</html>
